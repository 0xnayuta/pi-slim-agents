name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Use Node.js 24 for GitHub Actions runtime (deprecation of Node 20)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.0
          run_install: false

      - name: Print pnpm version
        run: pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: |
          STORE_PATH="$(pnpm store path --silent)"
          mkdir -p "$STORE_PATH"
          echo "STORE_PATH=$STORE_PATH" >> "$GITHUB_OUTPUT"
          echo "Store path: $STORE_PATH"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:agents

      - name: Run prompt eval checks
        run: pnpm test:prompts

      - name: Check package contents
        run: pnpm check:package

      - name: Dry-run pack
        run: pnpm pack:dry

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            dist/
            tests/
          retention-days: 7